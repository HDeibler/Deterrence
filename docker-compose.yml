services:
  postgres:
    image: postgres:16-alpine
    container_name: deterrence-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: deterrence
      POSTGRES_USER: deterrence
      POSTGRES_PASSWORD: deterrence_dev_password
    ports:
      - '55432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U deterrence -d deterrence']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
